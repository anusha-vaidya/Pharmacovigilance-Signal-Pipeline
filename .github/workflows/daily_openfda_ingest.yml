name: OpenFDA Daily Ingest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run OpenFDA fetch script
        env:
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
        run: |
          python src/fetch_openfda.py

      - name: Commit snapshots if present
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: add OpenFDA live snapshot [skip ci]" || true
            git push origin HEAD:main
          else
            echo "No new snapshots to commit"
          fi
